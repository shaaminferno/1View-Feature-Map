<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Flowchart System</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

        tailwind.config = { darkMode: 'class' };

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load Babel to transpile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script>
        // Configure Babel to use the classic JSX runtime (React.createElement)
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]

    </script>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Inline SVG Icons ---
        const Icon = ({ children, size = 24, className = '' }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
        const Minus = (p) => <Icon {...p}><path d="M5 12h14"/></Icon>;
        const ZoomIn = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></Icon>;
        const ZoomOut = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></Icon>;
        const Maximize = (p) => <Icon {...p}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></Icon>;
        const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
        const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const Edit = (p) => <Icon {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
        const ChevronDown = (p) => <Icon {...p}><path d="m6 9 6 6 6-6"/></Icon>;
        const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
        const Check = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5"/></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
        const PlusCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></Icon>;
        const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
        const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
        const Trash = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
        const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const Github = (p) => <Icon {...p}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></Icon>;
        const CloudDownload = (p) => <Icon {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></Icon>;
        const CloudUpload = (p) => <Icon {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></Icon>;
        const MessageCircle = (p) => <Icon {...p}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></Icon>;
        const Send = (p) => <Icon {...p}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Icon>;
        const Bot = (p) => <Icon {...p}><rect width="18" height="14" x="3" y="8" rx="2"/><path d="M12 5a3 3 0 1 0-3 3"/><line x1="9" x2="9" y1="18" y2="18"/><line x1="15" x2="15" y1="18" y2="18"/></Icon>;
        const Settings = (p) => <Icon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;

        // --- Default Data ---
        const defaultData = {
          id: 'root', label: 'System Modules', type: 'root', info: 'Main application system',
          children: [
            {
              id: 'm1', label: 'Customer Search', info: 'Module for finding and filtering customer accounts.',
              children: [
                { id: 'm1-f1', label: 'Search with multiple filters', info: 'Allows complex queries to find exact customer matches.' },
                { id: 'm1-f2', label: 'View only premise(Account level dropdown): Site ID should be visible', info: 'Dropdown configuration for premises.' },
                { id: 'm1-f3', label: 'View Premise button for Account level refs, should display premises and relavant service covers available for the refs', info: 'Action button to view detailed service coverages.' },
                { id: 'm1-f4', label: 'Pagination, selecting no of rows visible per page and check does navigate to next page', info: 'Table pagination controls.' }
              ]
            },
            {
              id: 'm2', label: 'Create Interaction', info: 'Module for initiating and managing customer interactions.',
              children: [
                { id: 'm2-f1', label: 'View Open Interactions Popup', info: 'Displays currently active/open interactions in a modal.' },
                { id: 'm2-f2', label: 'Open interactions dropdown for details', info: 'Select an interaction to see full details.' },
                { id: 'm2-f3', label: 'Dont create interaction', info: 'Cancel or bypass interaction creation.' },
                { id: 'm2-f4', label: 'Amend interaction', info: 'Edit an existing interaction record.' },
                { id: 'm2-f5', label: 'Create interaction', info: 'Finalize and save a new interaction.' }
              ]
            },
            {
              id: 'm3', label: 'Customer 360', info: 'Comprehensive view of all customer-related data.',
              children: [
                { id: 'm3-f1', label: 'View all details for Location/Bill To', info: 'Location and billing information overview.' },
                { id: 'm3-f2', label: 'Edit Contacts ( Depending countries Multi Contact will be available IT/PT)', info: 'Manage customer contact points based on region.' },
                { id: 'm3-f3', label: 'Customer Name fully visible and Business logo check', info: 'UI verification for branding and names.' },
                { id: 'm3-f4', label: 'Touchpoints details need to compare with Icabs', info: 'Data verification step against external system.' },
                { id: 'm3-f5', label: 'Navigation to relevant accounts ( Separate Scenario needed)', info: 'Links to related organizational accounts.' },
                { 
                  id: 'm3-f6', label: 'Invoice Tab', info: 'Financial interaction and billing histories.',
                  children: [
                    { id: 'm3-f6-s1', label: 'Check Single invoice by View/Send invoice button', info: 'Action to preview or email a specific invoice.' },
                    { id: 'm3-f6-s2', label: 'Check Dispute invoice icon when dispute invoice workflow creat...', info: 'Visual indicator for ongoing disputes.' },
                    { id: 'm3-f6-s3', label: 'Check Single Credit Notes by View/Send Credit notes button', info: 'Action to preview or email specific credit notes.' },
                    { id: 'm3-f6-s4', label: 'Check Send Multiple Credit Notes', info: 'Batch processing for credit notes.' }
                  ]
                }
              ]
            }
          ]
        };

        const NODE_WIDTH = 320;
        const NODE_HEIGHT = 85;
        const GAP_X = 100;
        const GAP_Y = 24;

        function App() {
          // --- App States ---
          const [data, setData] = useState(() => {
            const saved = localStorage.getItem('1view_map_data_cache');
            if (saved) {
              try { return JSON.parse(saved); } catch (e) { }
            }
            return defaultData;
          });
          const [expandedNodes, setExpandedNodes] = useState(new Set(['root', 'm1', 'm2', 'm3', 'm3-f6']));
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          const [transform, setTransform] = useState({ x: 100, y: 100, scale: 0.85 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
          const containerRef = useRef(null);
          const fileInputRef = useRef(null);

          const [showDataEditor, setShowDataEditor] = useState(false);
          const [jsonInput, setJsonInput] = useState('');
          
          const [editingNode, setEditingNode] = useState(null);
          const [editForm, setEditForm] = useState({ label: '', info: '' });
          
          const [addingNodeParent, setAddingNodeParent] = useState(null);
          const [newNodeForm, setNewNodeForm] = useState({ label: '', info: '' });

          const [infoNode, setInfoNode] = useState(null);
          const [infoTab, setInfoTab] = useState('description');
          const [newCountryName, setNewCountryName] = useState('');
          const [expandedCountries, setExpandedCountries] = useState({});
          const [editingAccount, setEditingAccount] = useState(null);
          const [newAccountInputs, setNewAccountInputs] = useState({});

          // GitHub / Bitbucket Sync States
          const [repoUrl, setRepoUrl] = useState(() => localStorage.getItem('1view_repo_url') || '');
          const [repoUser, setRepoUser] = useState(() => localStorage.getItem('1view_repo_user') || '');
          const [repoToken, setRepoToken] = useState(() => localStorage.getItem('1view_repo_token') || '');
          const [repoBranch, setRepoBranch] = useState(() => localStorage.getItem('1view_repo_branch') || 'main');
          const [repoFilePath, setRepoFilePath] = useState(() => localStorage.getItem('1view_repo_path') || '1View Map Data.txt');
          const [syncStatus, setSyncStatus] = useState('');
          const [isSyncing, setIsSyncing] = useState(false);

          // Search States
          const [searchQuery, setSearchQuery] = useState('');
          const [isDropdownOpen, setIsDropdownOpen] = useState(false);
          const [targetNodeId, setTargetNodeId] = useState(null);
          const [autoOpenNode, setAutoOpenNode] = useState(true);
          const searchRef = useRef(null);

          // AI Chat States
          const [isChatOpen, setIsChatOpen] = useState(false);
          const [chatMessages, setChatMessages] = useState([{ role: 'ai', text: 'Hi! I am connected to your flowchart data. Ask me anything about your modules, features, or available accounts.' }]);
          const [chatInput, setChatInput] = useState('');
          const [isAiTyping, setIsAiTyping] = useState(false);
          const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
          const [showApiKeySetup, setShowApiKeySetup] = useState(!localStorage.getItem('gemini_api_key'));
          const chatEndRef = useRef(null);

          // --- Effects ---
          useEffect(() => {
            localStorage.setItem('1view_map_data_cache', JSON.stringify(data));
          }, [data]);

          useEffect(() => {
            localStorage.setItem('1view_repo_url', repoUrl);
            localStorage.setItem('1view_repo_user', repoUser);
            localStorage.setItem('1view_repo_token', repoToken);
            localStorage.setItem('1view_repo_branch', repoBranch);
            localStorage.setItem('1view_repo_path', repoFilePath);
          }, [repoUrl, repoUser, repoToken, repoBranch, repoFilePath]);

          useEffect(() => {
            if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
          }, [chatMessages, isAiTyping, isChatOpen]);

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
              const PAN_STEP = 50;
              if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                setTransform(prev => {
                  let newX = prev.x, newY = prev.y;
                  switch (e.key) {
                    case 'ArrowUp': newY += PAN_STEP; break;
                    case 'ArrowDown': newY -= PAN_STEP; break;
                    case 'ArrowLeft': newX += PAN_STEP; break;
                    case 'ArrowRight': newX -= PAN_STEP; break;
                  }
                  return { ...prev, x: newX, y: newY };
                });
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, []);

          useEffect(() => {
            const container = containerRef.current;
            const handleWheel = (e) => {
              if (e.target.closest('.node-card')) return;
              e.preventDefault();
              const delta = -e.deltaY * 0.002;
              setTransform(prev => ({ ...prev, scale: Math.min(Math.max(0.2, prev.scale + delta), 3) }));
            };
            if (container) {
              container.addEventListener('wheel', handleWheel, { passive: false });
              return () => container.removeEventListener('wheel', handleWheel);
            }
          }, []);

          useEffect(() => {
            const handleClickOutside = (e) => {
              if (searchRef.current && !searchRef.current.contains(e.target)) {
                setIsDropdownOpen(false);
              }
            };
            document.addEventListener('mousedown', handleClickOutside);
            return () => document.removeEventListener('mousedown', handleClickOutside);
          }, []);

          // --- Git Sync Logic ---
          const utf8ToBase64 = (str) => window.btoa(unescape(encodeURIComponent(str)));
          const base64ToUtf8 = (str) => decodeURIComponent(escape(window.atob(str)));

          const parseRepoUrl = (url) => {
            let owner = '', repo = '', type = 'unknown';
            try {
              const cleanUrl = url.replace(/\.git$/, '').trim();
              if (cleanUrl.includes('github.com')) {
                type = 'github';
                const parts = cleanUrl.includes('github.com:') ? cleanUrl.split('github.com:')[1].split('/') : cleanUrl.split('github.com/')[1].split('/');
                owner = parts[0];
                repo = parts[1];
              } else if (cleanUrl.includes('bitbucket.org')) {
                type = 'bitbucket';
                const parts = cleanUrl.split('bitbucket.org/')[1].split('/');
                owner = parts[0];
                repo = parts[1];
              }
            } catch (e) { }
            return { type, owner, repo };
          };

          const pullFromRepo = async () => {
            const { type, owner, repo } = parseRepoUrl(repoUrl);
            if (type === 'unknown' || !owner || !repo) return setSyncStatus('Error: Invalid Repo URI (Requires github.com or bitbucket.org URL)');
            if (!repoToken) return setSyncStatus('Error: Token/App Password is required');
            if (type === 'bitbucket' && !repoUser) return setSyncStatus('Error: Bitbucket requires your exact Username');
            
            setIsSyncing(true);
            setSyncStatus('Authenticating and pulling data...');
            
            try {
              const cleanUser = repoUser.trim();
              const cleanToken = repoToken.trim();
              const cleanPath = repoFilePath.trim();
              const cleanBranch = repoBranch.trim();
              
              const authHeader = (type === 'bitbucket' || cleanUser) 
                ? `Basic ${window.btoa(`${cleanUser}:${cleanToken}`)}` 
                : `Bearer ${cleanToken}`;

              let contentStr = '';

              if (type === 'github') {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${cleanPath}?ref=${cleanBranch}`, {
                  headers: { Authorization: authHeader, Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 401) throw new Error('401 Unauthorized (Check Token & Username)');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const result = await res.json();
                contentStr = base64ToUtf8(result.content);
              } 
              else if (type === 'bitbucket') {
                const res = await fetch(`https://api.bitbucket.org/2.0/repositories/${owner}/${repo}/src/${cleanBranch}/${cleanPath}`, {
                  headers: { Authorization: authHeader }
                });
                if (res.status === 401) throw new Error('401 Unauthorized (Verify Username and ensure App Password is valid)');
                if (!res.ok) throw new Error(`HTTP Error ${res.status} (File or branch may not exist)`);
                contentStr = await res.text();
              }

              const parsed = JSON.parse(contentStr);
              setData(parsed);
              setJsonInput(JSON.stringify(parsed, null, 2));
              setSyncStatus('Successfully pulled data!');
              setTimeout(() => setSyncStatus(''), 4000);
            } catch (e) {
              setSyncStatus(`Pull failed: ${e.message}`);
            }
            setIsSyncing(false);
          };

          const pushToRepo = async () => {
            const { type, owner, repo } = parseRepoUrl(repoUrl);
            if (type === 'unknown' || !owner || !repo) return setSyncStatus('Error: Invalid Repo URI');
            if (!repoToken) return setSyncStatus('Error: Token/App Password is required');
            if (type === 'bitbucket' && !repoUser) return setSyncStatus('Error: Bitbucket requires your exact Username');

            setIsSyncing(true);
            setSyncStatus('Authenticating and preparing push...');
            
            try {
              const cleanUser = repoUser.trim();
              const cleanToken = repoToken.trim();
              const cleanPath = repoFilePath.trim();
              const cleanBranch = repoBranch.trim();
              
              const authHeader = (type === 'bitbucket' || cleanUser) 
                ? `Basic ${window.btoa(`${cleanUser}:${cleanToken}`)}` 
                : `Bearer ${cleanToken}`;

              const contentStr = JSON.stringify(data, null, 2);

              if (type === 'github') {
                const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${cleanPath}?ref=${cleanBranch}`, {
                  headers: { Authorization: authHeader, Accept: 'application/vnd.github.v3+json' }
                });
                let sha = null;
                if (getRes.ok) {
                  const getResult = await getRes.json();
                  sha = getResult.sha;
                }
                
                setSyncStatus('Pushing changes to GitHub...');
                const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${cleanPath}`, {
                  method: 'PUT',
                  headers: { Authorization: authHeader, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    message: `Update map data via Flowchart App`,
                    content: utf8ToBase64(contentStr),
                    sha: sha,
                    branch: cleanBranch
                  })
                });
                if (putRes.status === 401) throw new Error('401 Unauthorized (Check Token & Username)');
                if (!putRes.ok) throw new Error(`HTTP ${putRes.status}`);
              } 
              else if (type === 'bitbucket') {
                setSyncStatus('Pushing changes to Bitbucket...');
                const formData = new FormData();
                formData.append('message', 'Update map data via Flowchart App');
                formData.append('branch', cleanBranch);
                formData.append(cleanPath, new Blob([contentStr], { type: 'text/plain' }), cleanPath);

                const postRes = await fetch(`https://api.bitbucket.org/2.0/repositories/${owner}/${repo}/src`, {
                  method: 'POST',
                  headers: { Authorization: authHeader },
                  body: formData
                });
                if (postRes.status === 401) throw new Error('401 Unauthorized (Check App Password "Write" permissions)');
                if (!postRes.ok) throw new Error(`HTTP ${postRes.status}`);
              }

              setSyncStatus('Successfully pushed changes!');
              setTimeout(() => setSyncStatus(''), 4000);
            } catch (e) {
              setSyncStatus(`Push failed: ${e.message}`);
            }
            setIsSyncing(false);
          };

          // --- AI Chat Logic ---
          const saveApiKey = (key) => {
            setApiKey(key);
            localStorage.setItem('gemini_api_key', key);
            setShowApiKeySetup(false);
          };

          const handleSendChatMessage = async () => {
            if (!chatInput.trim() || !apiKey) return;
            
            const userMsg = chatInput;
            setChatInput('');
            setChatMessages(prev => [...prev, { role: 'user', text: userMsg }]);
            setIsAiTyping(true);

            try {
              const dataContext = JSON.stringify(data);
              const systemPrompt = `You are a helpful data assistant integrated into a flowchart application. 
              Here is the JSON representation of the user's current flowchart data map:
              ${dataContext}
              
              Answer the user's question accurately based ONLY on the data provided above. 
              Be concise, professional, and format your response cleanly (use bullet points if needed).`;

              const historyContents = chatMessages.slice(1).map(msg => ({
                role: msg.role === 'ai' ? 'model' : 'user',
                parts: [{ text: msg.text }]
              }));

              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [
                    { role: "user", parts: [{ text: systemPrompt }] },
                    ...historyContents,
                    { role: "user", parts: [{ text: userMsg }] }
                  ]
                })
              });

              if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'API Error');
              }

              const result = await response.json();
              const aiText = result.candidates[0].content.parts[0].text;
              
              setChatMessages(prev => [...prev, { role: 'ai', text: aiText }]);
            } catch (error) {
              console.error("AI Error:", error);
              setChatMessages(prev => [...prev, { role: 'ai', text: `Error: Could not connect to AI. Please check your API key. Details: ${error.message}` }]);
              if (error.message.includes("API key")) setShowApiKeySetup(true);
            } finally {
              setIsAiTyping(false);
            }
          };

          // --- Search Logic ---
          const allNodesFlat = useMemo(() => {
            const flat = [];
            const traverse = (node, pathLabel) => {
              const fullLabel = pathLabel ? `${pathLabel} > ${node.label}` : node.label;
              let searchableText = `${node.label} ${node.info || ''}`;
              if (node.countries) {
                 node.countries.forEach(c => { searchableText += ` ${c.name} ${c.accounts.join(' ')}`; });
              }
              flat.push({ ...node, fullLabel, searchableText: searchableText.toLowerCase() });
              if (node.children) { node.children.forEach(c => traverse(c, fullLabel)); }
            };
            if (data) traverse(data, '');
            return flat;
          }, [data]);

          const searchResults = useMemo(() => {
            if (!searchQuery.trim()) return [];
            const q = searchQuery.toLowerCase();
            return allNodesFlat.filter(n => n.searchableText.includes(q)).slice(0, 8);
          }, [searchQuery, allNodesFlat]);

          const getPathToNode = (root, targetId) => {
            if (root.id === targetId) return [root.id];
            if (root.children) {
              for (let child of root.children) {
                const path = getPathToNode(child, targetId);
                if (path) return [root.id, ...path];
              }
            }
            return null;
          };

          const handleSuggestionClick = (nodeId) => {
            const path = getPathToNode(data, nodeId);
            if (path) {
              setExpandedNodes(prev => {
                const next = new Set(prev);
                path.forEach(id => next.add(id));
                return next;
              });
              setTargetNodeId(nodeId);

              if (autoOpenNode) {
                const targetNode = allNodesFlat.find(n => n.id === nodeId);
                if (targetNode) openInfoNode(targetNode, null);
              }
            }
            setSearchQuery('');
            setIsDropdownOpen(false);
          };

          // --- Node Modifiers ---
          const toggleNode = (nodeId, e) => {
            e.stopPropagation();
            setExpandedNodes(prev => {
              const next = new Set(prev);
              if (next.has(nodeId)) next.delete(nodeId); else next.add(nodeId);
              return next;
            });
          };

          const deleteNode = (nodeId, e) => {
            e.stopPropagation();
            if (nodeId === 'root') { alert("Root module cannot be deleted."); return; }
            if (!window.confirm("Are you sure you want to delete this module and its sub-modules?")) return;
            const deleteRecursive = (nodes) => {
              if (!nodes) return [];
              return nodes.filter(n => n.id !== nodeId).map(n => ({ ...n, children: deleteRecursive(n.children) }));
            };
            setData(prev => ({ ...prev, children: deleteRecursive(prev.children) }));
          };

          const openEditNode = (node, e) => { e.stopPropagation(); setEditingNode(node); setEditForm({ label: node.label, info: node.info || '' }); };
          const saveEditNode = () => {
            const updateRecursive = (n) => {
              if (n.id === editingNode.id) return { ...n, label: editForm.label, info: editForm.info };
              if (n.children) return { ...n, children: n.children.map(updateRecursive) };
              return n;
            };
            setData(updateRecursive(data));
            setEditingNode(null);
          };

          const openAddNode = (node, e) => { e.stopPropagation(); setAddingNodeParent(node); setNewNodeForm({ label: '', info: '' }); };
          const saveNewNode = () => {
            if (!newNodeForm.label.trim()) return;
            const newNode = { id: `node-${Date.now()}`, label: newNodeForm.label, info: newNodeForm.info, children: [] };
            const updateRecursive = (n) => {
              if (n.id === addingNodeParent.id) return { ...n, children: [...(n.children || []), newNode] };
              if (n.children) return { ...n, children: n.children.map(updateRecursive) };
              return n;
            };
            setData(updateRecursive(data));
            setExpandedNodes(prev => new Set(prev).add(addingNodeParent.id));
            setAddingNodeParent(null);
          };

          const openInfoNode = (node, e) => {
            if(e) e.stopPropagation();
            setInfoNode(node);
            setInfoTab('description');
            setExpandedCountries({});
            setNewCountryName('');
          };

          const addCountryToInfoNode = () => {
            if (!newCountryName.trim()) return;
            const newCountry = { name: newCountryName, accounts: [`ACC-${Math.floor(1000 + Math.random() * 9000)}`, `ACC-${Math.floor(1000 + Math.random() * 9000)}`] };
            const updateRecursive = (n) => {
              if (n.id === infoNode.id) {
                const updatedNode = { ...n, countries: [...(n.countries || []), newCountry] };
                setInfoNode(updatedNode); 
                return updatedNode;
              }
              if (n.children) return { ...n, children: n.children.map(updateRecursive) };
              return n;
            };
            setData(updateRecursive(data));
            setNewCountryName('');
          };

          const toggleCountryExpand = (countryName) => {
            setExpandedCountries(prev => ({ ...prev, [countryName]: !prev[countryName] }));
          };

          const startEditingAccount = (countryName, index, value) => {
            setEditingAccount({ countryName, index, value });
          };

          const saveAccountEdit = () => {
            if (!editingAccount) return;
            const updateRecursive = (n) => {
              if (n.id === infoNode.id) {
                const updatedCountries = n.countries.map(c => {
                  if (c.name === editingAccount.countryName) {
                    const newAccounts = [...c.accounts];
                    newAccounts[editingAccount.index] = editingAccount.value;
                    return { ...c, accounts: newAccounts };
                  }
                  return c;
                });
                const updatedNode = { ...n, countries: updatedCountries };
                setInfoNode(updatedNode);
                return updatedNode;
              }
              if (n.children) return { ...n, children: n.children.map(updateRecursive) };
              return n;
            };
            setData(updateRecursive(data));
            setEditingAccount(null);
          };

          const addAccountToCountry = (countryName) => {
            const accountVal = newAccountInputs[countryName];
            if (!accountVal || !accountVal.trim()) return;

            const updateRecursive = (n) => {
              if (n.id === infoNode.id) {
                const updatedCountries = n.countries.map(c => {
                  if (c.name === countryName) return { ...c, accounts: [...c.accounts, accountVal.trim()] };
                  return c;
                });
                const updatedNode = { ...n, countries: updatedCountries };
                setInfoNode(updatedNode);
                return updatedNode;
              }
              if (n.children) return { ...n, children: n.children.map(updateRecursive) };
              return n;
            };
            setData(updateRecursive(data));
            setNewAccountInputs(prev => ({ ...prev, [countryName]: '' }));
          };

          // --- Local File Sync ---
          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const parsed = JSON.parse(event.target.result);
                setData(parsed);
                setJsonInput(JSON.stringify(parsed, null, 2));
              } catch (error) { alert("Error parsing file. Please ensure valid JSON data."); }
            };
            reader.readAsText(file);
            e.target.value = null;
          };

          const handleFileDownload = () => {
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = '1View Map Data.txt';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          };

          // --- Canvas Interactions ---
          const handleMouseDown = (e) => {
            if (e.target.closest('.node-card')) return;
            setIsDragging(true);
            setDragStart({ x: e.clientX - transform.x, y: e.clientY - transform.y });
          };
          const handleMouseMove = (e) => {
            if (!isDragging) return;
            setTransform(prev => ({ ...prev, x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }));
          };
          const handleMouseUp = () => setIsDragging(false);

          const zoomIn = () => setTransform(p => ({ ...p, scale: Math.min(p.scale + 0.2, 3) }));
          const zoomOut = () => setTransform(p => ({ ...p, scale: Math.max(p.scale - 0.2, 0.2) }));
          const resetView = () => setTransform({ x: 100, y: 100, scale: 0.85 });

          // --- Layout Algorithm ---
          const { nodes, edges } = useMemo(() => {
            const calcNodes = [];
            const calcEdges = [];

            const computeHeight = (node) => {
              const isExpanded = expandedNodes.has(node.id);
              if (isExpanded && node.children && node.children.length > 0) {
                let h = 0;
                node.children.forEach(c => { h += computeHeight(c); });
                node._h = h;
                return h;
              }
              node._h = NODE_HEIGHT + GAP_Y;
              return node._h;
            };

            const assignPositions = (node, depth, x, startY) => {
              const isExpanded = expandedNodes.has(node.id);
              const myH = node._h || (NODE_HEIGHT + GAP_Y);
              const myY = startY + (myH / 2);

              calcNodes.push({ ...node, depth, x, y: myY - NODE_HEIGHT / 2 });

              if (isExpanded && node.children && node.children.length > 0) {
                let currentY = startY;
                node.children.forEach(c => {
                  const childNode = assignPositions(c, depth + 1, x + NODE_WIDTH + GAP_X, currentY);
                  currentY += c._h;
                  calcEdges.push({
                    id: `${node.id}-${c.id}`,
                    x1: x + NODE_WIDTH, y1: myY, x2: childNode.x, y2: childNode.y + NODE_HEIGHT / 2
                  });
                });
              }
              return { x, y: myY - NODE_HEIGHT / 2 };
            };

            if (data) {
              computeHeight(data);
              assignPositions(data, 0, 0, 0);
            }
            return { nodes: calcNodes, edges: calcEdges };
          }, [data, expandedNodes]);

          // Auto-center effect
          useEffect(() => {
            if (targetNodeId && nodes.length > 0) {
              const targetNode = nodes.find(n => n.id === targetNodeId);
              if (targetNode) {
                const container = containerRef.current;
                const containerWidth = container ? container.clientWidth : window.innerWidth;
                const containerHeight = container ? container.clientHeight : window.innerHeight;
                
                const scale = 1.2;
                const newX = (containerWidth / 2) - ((targetNode.x + NODE_WIDTH / 2) * scale);
                const newY = (containerHeight / 2) - ((targetNode.y + NODE_HEIGHT / 2) * scale);
                
                setTransform({ x: newX, y: newY, scale });
                setTargetNodeId(null);
              }
            }
          }, [targetNodeId, nodes]);

          const getDepthColor = (depth) => {
            const colors = [
              'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/40',
              'border-emerald-500 bg-emerald-50 dark:bg-emerald-950/40',
              'border-blue-400 bg-blue-50 dark:bg-blue-950/40',
              'border-orange-400 bg-orange-50 dark:bg-orange-950/40'
            ];
            return colors[depth] || 'border-gray-400 bg-gray-50 dark:bg-slate-800';
          };

          return (
            <div className={`${isDarkMode ? 'dark' : ''} h-screen w-full`}>
              <div className="relative w-full h-full bg-slate-100 dark:bg-slate-900 overflow-hidden font-sans flex flex-col transition-colors duration-300">
                
                {/* --- Top Navigation Bar --- */}
                <div className="absolute top-0 left-0 right-0 z-30 p-4 pointer-events-none flex flex-wrap md:flex-nowrap gap-4 justify-between items-start">
                  
                  {/* --- Top Left Tools --- */}
                  <div className="pointer-events-auto flex shrink-0 order-1">
                    <div className="bg-white dark:bg-slate-800 px-4 h-[46px] rounded-xl shadow-md border border-gray-200 dark:border-slate-700 flex items-center gap-3 transition-colors">
                      <button onClick={zoomOut} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-gray-600 dark:text-gray-300 transition-colors" title="Zoom Out"><ZoomOut size={18} /></button>
                      <span className="text-sm font-medium w-12 text-center text-gray-800 dark:text-gray-200">{Math.round(transform.scale * 100)}%</span>
                      <button onClick={zoomIn} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-gray-600 dark:text-gray-300 transition-colors" title="Zoom In"><ZoomIn size={18} /></button>
                      <div className="w-px h-6 bg-gray-300 dark:bg-slate-600 mx-1"></div>
                      <button onClick={resetView} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-gray-600 dark:text-gray-300 transition-colors" title="Reset View"><Maximize size={18} /></button>
                      <div className="w-px h-6 bg-gray-300 dark:bg-slate-600 mx-1"></div>
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded text-gray-600 dark:text-gray-300 transition-colors" title="Toggle Theme">
                        {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
                      </button>
                    </div>
                  </div>

                  {/* --- Main Search Bar --- */}
                  <div className="pointer-events-auto w-full md:w-auto flex-1 max-w-2xl order-3 md:order-2 mx-auto" ref={searchRef}>
                    <div className="flex gap-2 items-start relative w-full">
                      <div className="relative flex-1">
                        <div className="absolute inset-y-0 left-0 pl-3 h-[46px] flex items-center pointer-events-none text-gray-400">
                          <Search size={18} />
                        </div>
                        <input
                          type="text"
                          value={searchQuery}
                          onChange={(e) => { setSearchQuery(e.target.value); setIsDropdownOpen(true); }}
                          onFocus={() => setIsDropdownOpen(true)}
                          className="w-full pl-10 pr-10 py-2.5 h-[46px] border border-gray-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none shadow-lg transition-colors"
                          placeholder="Search modules, features, or data..."
                        />
                        {searchQuery && (
                          <button onClick={() => setSearchQuery('')} className="absolute inset-y-0 right-0 pr-3 h-[46px] flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                            <X size={16} />
                          </button>
                        )}
                        
                        {isDropdownOpen && searchResults.length > 0 && (
                          <div className="absolute top-full mt-2 left-0 right-0 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl shadow-2xl max-h-[50vh] overflow-y-auto">
                            {searchResults.map(res => (
                              <div 
                                key={res.id} 
                                onClick={() => handleSuggestionClick(res.id)}
                                className="px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-700 cursor-pointer border-b last:border-0 border-gray-100 dark:border-slate-700 transition-colors"
                              >
                                <div className="text-sm font-semibold text-gray-800 dark:text-gray-200">{res.label}</div>
                                <div className="text-xs text-gray-500 dark:text-gray-400 mt-1 truncate">{res.fullLabel}</div>
                                {res.info && <div className="text-xs text-gray-400 dark:text-gray-500 mt-0.5 truncate">{res.info}</div>}
                              </div>
                            ))}
                          </div>
                        )}
                        {isDropdownOpen && searchQuery && searchResults.length === 0 && (
                          <div className="absolute top-full mt-2 left-0 right-0 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl shadow-xl px-4 py-4 text-sm text-gray-500 dark:text-gray-400 text-center">
                            No matching modules or data found.
                          </div>
                        )}
                      </div>
                      
                      <label className="flex items-center gap-2 cursor-pointer bg-white dark:bg-slate-800 px-3 h-[46px] rounded-xl border border-gray-300 dark:border-slate-600 shadow-lg shrink-0" title="Automatically open info modal when selecting a search suggestion">
                        <div className="relative flex items-center">
                          <input type="checkbox" className="sr-only" checked={autoOpenNode} onChange={() => setAutoOpenNode(!autoOpenNode)} />
                          <div className={`block w-9 h-5 rounded-full transition-colors ${autoOpenNode ? 'bg-blue-500' : 'bg-gray-300 dark:bg-slate-600'}`}></div>
                          <div className={`dot absolute left-1 bg-white w-3 h-3 rounded-full transition-transform ${autoOpenNode ? 'transform translate-x-4' : ''}`}></div>
                        </div>
                        <span className="text-xs font-semibold text-gray-600 dark:text-gray-300 whitespace-nowrap hidden sm:inline">Auto-open</span>
                      </label>
                    </div>
                  </div>
                  
                  {/* --- Top Right Data Button --- */}
                  <div className="pointer-events-auto shrink-0 flex justify-end order-2 md:order-3">
                    <button onClick={() => { setJsonInput(JSON.stringify(data, null, 2)); setShowDataEditor(true); }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 h-[46px] rounded-xl shadow-md flex items-center gap-2 transition-colors text-sm font-medium">
                      <Database size={16} /> <span className="hidden sm:inline">Manage Data</span>
                    </button>
                  </div>
                </div>

                {/* --- AI Chatbot Widget --- */}
                <div className="absolute bottom-6 right-6 z-40 flex flex-col items-end">
                  {isChatOpen && (
                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-slate-700 w-[350px] h-[500px] mb-4 flex flex-col overflow-hidden transition-all duration-300">
                      <div className="bg-blue-600 px-4 py-3 text-white flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-2 font-medium">
                          <Bot size={20} /> Data Assistant
                        </div>
                        <div className="flex gap-2">
                          <button onClick={() => setShowApiKeySetup(!showApiKeySetup)} className="hover:bg-blue-700 p-1 rounded transition-colors" title="Settings">
                            <Settings size={18} />
                          </button>
                          <button onClick={() => setIsChatOpen(false)} className="hover:bg-blue-700 p-1 rounded transition-colors" title="Close Chat">
                            <X size={18} />
                          </button>
                        </div>
                      </div>

                      {showApiKeySetup ? (
                        <div className="flex-1 p-6 flex flex-col bg-gray-50 dark:bg-slate-900 justify-center text-sm">
                          <h3 className="font-semibold text-gray-800 dark:text-gray-100 mb-2">Configure AI Assistant</h3>
                          <p className="text-gray-600 dark:text-gray-400 mb-4">To enable chat, please provide a free Google Gemini API Key. It will be stored securely in your browser's local storage.</p>
                          <input 
                            type="password" 
                            placeholder="Paste API Key here..."
                            value={apiKey}
                            onChange={(e) => setApiKey(e.target.value)}
                            className="w-full p-2.5 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none mb-3 transition-colors"
                          />
                          <button onClick={() => saveApiKey(apiKey)} className="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition-colors">
                            Save Key & Start Chatting
                          </button>
                          <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer" className="text-blue-500 hover:underline text-center mt-4">Get a free API key here</a>
                        </div>
                      ) : (
                        <>
                          <div className="flex-1 overflow-y-auto p-4 bg-gray-50 dark:bg-slate-900 flex flex-col gap-3">
                            {chatMessages.map((msg, idx) => (
                              <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] rounded-xl p-3 text-sm shadow-sm ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 border border-gray-100 dark:border-slate-600 rounded-bl-sm'}`}>
                                  <span dangerouslySetInnerHTML={{__html: msg.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>')}} />
                                </div>
                              </div>
                            ))}
                            {isAiTyping && (
                              <div className="flex justify-start">
                                <div className="bg-white dark:bg-slate-700 border border-gray-100 dark:border-slate-600 rounded-xl rounded-bl-sm p-3 shadow-sm flex gap-1">
                                  <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                  <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                  <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                </div>
                              </div>
                            )}
                            <div ref={chatEndRef} />
                          </div>

                          <div className="p-3 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-slate-700 flex gap-2 shrink-0">
                            <input 
                              type="text" 
                              value={chatInput}
                              onChange={(e) => setChatInput(e.target.value)}
                              onKeyDown={(e) => e.key === 'Enter' && handleSendChatMessage()}
                              placeholder="Ask about your map data..."
                              className="flex-1 bg-gray-100 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-full px-4 py-2 text-sm text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                            />
                            <button 
                              onClick={handleSendChatMessage}
                              disabled={isAiTyping || !chatInput.trim()}
                              className="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white w-10 h-10 rounded-full flex items-center justify-center transition-colors shrink-0 shadow-md"
                            >
                              <Send size={16} className={chatInput.trim() ? "ml-0.5" : ""} />
                            </button>
                          </div>
                        </>
                      )}
                    </div>
                  )}

                  <button 
                    onClick={() => setIsChatOpen(!isChatOpen)}
                    className="w-14 h-14 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center shadow-2xl hover:shadow-blue-500/50 transition-all hover:-translate-y-1"
                    title="Ask AI Data Assistant"
                  >
                    {isChatOpen ? <X size={24} /> : <MessageCircle size={28} />}
                  </button>
                </div>

                {/* --- Canvas Workspace --- */}
                <div 
                  ref={containerRef}
                  className={`flex-1 w-full h-full relative ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                >
                  <div className="absolute origin-top-left" style={{ transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`, transition: isDragging ? 'none' : 'transform 0.3s ease-out' }}>
                    <svg className="absolute top-0 left-0 overflow-visible pointer-events-none">
                      {edges.map((edge) => {
                        const midX = (edge.x1 + edge.x2) / 2;
                        const pathStr = `M ${edge.x1} ${edge.y1} C ${midX} ${edge.y1}, ${midX} ${edge.y2}, ${edge.x2} ${edge.y2}`;
                        return <path key={edge.id} d={pathStr} fill="none" strokeWidth="2.5" className="transition-all duration-300 ease-in-out stroke-slate-400 dark:stroke-slate-600" />;
                      })}
                    </svg>

                    {nodes.map(node => {
                      const hasChildren = node.children && node.children.length > 0;
                      const isExpanded = expandedNodes.has(node.id);

                      return (
                        <div key={node.id} className={`node-card absolute bg-white dark:bg-slate-800 rounded-xl shadow-lg border-2 flex flex-col justify-center px-4 transition-all duration-300 ease-in-out hover:shadow-xl ${getDepthColor(node.depth)}`} style={{ width: NODE_WIDTH, height: NODE_HEIGHT, left: node.x, top: node.y, cursor: hasChildren ? 'pointer' : 'default' }} onClick={(e) => hasChildren && toggleNode(node.id, e)}>
                          <div className="flex items-start justify-between">
                            <div className="flex-1 pr-2">
                              <h3 className="font-semibold text-gray-800 dark:text-gray-100 text-sm leading-tight line-clamp-2" title={node.label}>{node.label}</h3>
                            </div>
                            <div className="flex items-center gap-0.5 shrink-0">
                              <div className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 text-emerald-600 dark:text-emerald-400 transition-colors cursor-pointer" onClick={(e) => openAddNode(node, e)} title="Add Sub Node"><PlusCircle size={16} /></div>
                              <div className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 text-blue-600 dark:text-blue-400 transition-colors cursor-pointer" onClick={(e) => openEditNode(node, e)} title="Edit Node"><Edit size={16} /></div>
                              <div className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-slate-700 text-blue-600 dark:text-blue-400 transition-colors cursor-pointer" onClick={(e) => openInfoNode(node, e)} title="Information"><Info size={16} /></div>
                              {node.id !== 'root' && (
                                <div className="p-1.5 rounded-full hover:bg-red-100 dark:hover:bg-red-900/40 text-red-500 dark:text-red-400 transition-colors cursor-pointer" onClick={(e) => deleteNode(node.id, e)} title="Delete Node"><Trash size={16} /></div>
                              )}
                            </div>
                          </div>
                          {hasChildren && (
                            <div className="absolute -right-3 top-1/2 -translate-y-1/2 bg-white dark:bg-slate-700 border border-gray-300 dark:border-slate-500 rounded-full shadow-sm w-6 h-6 flex items-center justify-center text-gray-600 dark:text-gray-300 z-10 transition-colors">
                              {isExpanded ? <Minus size={14} /> : <Plus size={14} />}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* --- Modals --- */}
                {editingNode && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden transition-colors">
                      <div className="px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50 dark:bg-slate-900">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">Edit Node</h2>
                        <button onClick={() => setEditingNode(null)} className="text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><X size={24} /></button>
                      </div>
                      <div className="p-6 flex flex-col gap-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Label / Title</label>
                          <input type="text" value={editForm.label} onChange={(e) => setEditForm(prev => ({ ...prev, label: e.target.value }))} className="w-full p-2 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description Info</label>
                          <textarea value={editForm.info} onChange={(e) => setEditForm(prev => ({ ...prev, info: e.target.value }))} className="w-full p-2 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none h-24 transition-colors" />
                        </div>
                      </div>
                      <div className="px-6 py-4 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex justify-end gap-3 transition-colors">
                        <button onClick={() => setEditingNode(null)} className="px-4 py-2 rounded-lg text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">Cancel</button>
                        <button onClick={saveEditNode} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">Save Changes</button>
                      </div>
                    </div>
                  </div>
                )}

                {addingNodeParent && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-md overflow-hidden transition-colors">
                      <div className="px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50 dark:bg-slate-900">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">Add Connected Node</h2>
                        <button onClick={() => setAddingNodeParent(null)} className="text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><X size={24} /></button>
                      </div>
                      <div className="p-6 flex flex-col gap-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">New Label / Title</label>
                          <input type="text" value={newNodeForm.label} onChange={(e) => setNewNodeForm(prev => ({ ...prev, label: e.target.value }))} className="w-full p-2 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none transition-colors" placeholder="Enter module or feature name" />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description Info</label>
                          <textarea value={newNodeForm.info} onChange={(e) => setNewNodeForm(prev => ({ ...prev, info: e.target.value }))} className="w-full p-2 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none h-24 transition-colors" placeholder="Optional information details..." />
                        </div>
                      </div>
                      <div className="px-6 py-4 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex justify-end gap-3 transition-colors">
                        <button onClick={() => setAddingNodeParent(null)} className="px-4 py-2 rounded-lg text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">Cancel</button>
                        <button onClick={saveNewNode} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium transition-colors">Create Node</button>
                      </div>
                    </div>
                  </div>
                )}

                {infoNode && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col h-[60vh] max-h-[600px] transition-colors">
                      <div className="px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50 dark:bg-slate-900 shrink-0">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">{infoNode.label}</h2>
                        <button onClick={() => setInfoNode(null)} className="text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><X size={24} /></button>
                      </div>
                      <div className="flex border-b border-gray-200 dark:border-slate-700 shrink-0 px-2 pt-2 bg-white dark:bg-slate-800 transition-colors">
                        <button onClick={() => setInfoTab('description')} className={`px-4 py-2 border-b-2 font-medium text-sm transition-colors ${infoTab === 'description' ? 'border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400' : 'border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'}`}>Description</button>
                        <button onClick={() => setInfoTab('countries')} className={`px-4 py-2 border-b-2 font-medium text-sm transition-colors ${infoTab === 'countries' ? 'border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400' : 'border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'}`}>Country Availability</button>
                      </div>
                      <div className="p-6 overflow-y-auto flex-1 bg-white dark:bg-slate-800 transition-colors">
                        {infoTab === 'description' ? (
                          <div className="text-gray-700 dark:text-gray-300 leading-relaxed">{infoNode.info || 'No description provided for this module/feature.'}</div>
                        ) : (
                          <div className="flex flex-col gap-4">
                            <div className="flex gap-2">
                              <input type="text" value={newCountryName} onChange={(e) => setNewCountryName(e.target.value)} placeholder="Enter country name..." className="flex-1 p-2 border border-gray-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-colors" onKeyDown={(e) => e.key === 'Enter' && addCountryToInfoNode()} />
                              <button onClick={addCountryToInfoNode} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition-colors">Add</button>
                            </div>
                            <div className="flex flex-col gap-2 mt-2">
                              {(!infoNode.countries || infoNode.countries.length === 0) && <div className="text-gray-500 dark:text-gray-400 text-sm italic py-4 text-center">No countries configured yet. Add one above.</div>}
                              {infoNode.countries?.map((country, idx) => (
                                <div key={idx} className="border border-gray-200 dark:border-slate-600 rounded-lg overflow-hidden bg-gray-50 dark:bg-slate-900 transition-colors">
                                  <button onClick={() => toggleCountryExpand(country.name)} className="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
                                    <span className="font-medium text-gray-800 dark:text-gray-200">{country.name}</span>
                                    {expandedCountries[country.name] ? <ChevronDown size={18} className="text-gray-500 dark:text-gray-400" /> : <ChevronRight size={18} className="text-gray-500 dark:text-gray-400" />}
                                  </button>
                                  {expandedCountries[country.name] && (
                                    <div className="px-4 py-3 border-t border-gray-200 dark:border-slate-600 bg-white dark:bg-slate-800 transition-colors">
                                      <h4 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Available Accounts</h4>
                                      <ul className="flex flex-col gap-1">
                                        {country.accounts.map((acc, aIdx) => (
                                          <li key={aIdx} className="text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-slate-700 px-3 py-1.5 rounded border border-gray-100 dark:border-slate-600 font-mono flex justify-between items-center group min-h-[36px] transition-colors">
                                            {editingAccount?.countryName === country.name && editingAccount?.index === aIdx ? (
                                              <div className="flex gap-2 w-full items-center">
                                                <input type="text" value={editingAccount.value} onChange={(e) => setEditingAccount(prev => ({ ...prev, value: e.target.value }))} className="flex-1 p-1 px-2 text-sm border border-blue-300 dark:border-blue-500 rounded bg-white dark:bg-slate-600 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" autoFocus onKeyDown={(e) => { if (e.key === 'Enter') saveAccountEdit(); if (e.key === 'Escape') setEditingAccount(null); }} />
                                                <button onClick={saveAccountEdit} className="p-1 text-green-600 dark:text-green-400 hover:bg-green-100 dark:hover:bg-green-900/40 rounded transition-colors" title="Save"><Check size={16} /></button>
                                                <button onClick={() => setEditingAccount(null)} className="p-1 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 rounded transition-colors" title="Cancel"><X size={16} /></button>
                                              </div>
                                            ) : (
                                              <>
                                                <span>{acc}</span>
                                                <button onClick={() => startEditingAccount(country.name, aIdx, acc)} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-all p-1" title="Edit Account"><Edit size={14} /></button>
                                              </>
                                            )}
                                          </li>
                                        ))}
                                      </ul>
                                      <div className="mt-3 flex gap-2">
                                        <input type="text" value={newAccountInputs[country.name] || ''} onChange={(e) => setNewAccountInputs(prev => ({ ...prev, [country.name]: e.target.value }))} placeholder="Add new account..." className="flex-1 p-1.5 px-2 text-sm border border-gray-300 dark:border-slate-600 rounded bg-white dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" onKeyDown={(e) => e.key === 'Enter' && addAccountToCountry(country.name)} />
                                        <button onClick={() => addAccountToCountry(country.name)} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium transition-colors">Add</button>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* --- Manage Data Modal with Git Sync --- */}
                {showDataEditor && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-3xl h-[80vh] flex flex-col overflow-hidden transition-colors">
                      <div className="px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex justify-between items-center bg-gray-50 dark:bg-slate-900">
                        <h2 className="text-xl font-bold text-gray-800 dark:text-gray-100">Flowchart Data Management</h2>
                        <button onClick={() => setShowDataEditor(false)} className="text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><X size={24} /></button>
                      </div>
                      
                      <div className="p-6 flex-1 flex flex-col gap-4 overflow-y-auto">
                        
                        {/* Repository Sync Section */}
                        <div className="flex flex-col gap-3 bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg border border-blue-100 dark:border-blue-800">
                          <div>
                            <h3 className="font-semibold text-blue-800 dark:text-blue-300 flex items-center gap-2">
                              <Github size={18} /> Git Repository Sync
                            </h3>
                            <p className="text-sm text-blue-600 dark:text-blue-400 mt-1">
                              Manage your JSON data directly from a GitHub or Bitbucket repository.
                            </p>
                          </div>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">
                            <div className="md:col-span-2">
                              <label className="block text-xs font-medium text-blue-700 dark:text-blue-400 mb-1">Repo URI / URL</label>
                              <input type="text" value={repoUrl} onChange={(e) => setRepoUrl(e.target.value)} placeholder="https://bitbucket.org/owner/repo" className="w-full p-2 text-sm border border-blue-200 dark:border-blue-700 rounded bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div>
                              <label className="block text-xs font-medium text-blue-700 dark:text-blue-400 mb-1">Bitbucket Username (Profile ID)</label>
                              <input type="text" value={repoUser} onChange={(e) => setRepoUser(e.target.value)} placeholder="e.g., shaamkarthikn" className="w-full p-2 text-sm border border-blue-200 dark:border-blue-700 rounded bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div>
                              <label className="block text-xs font-medium text-blue-700 dark:text-blue-400 mb-1">App Password / Token</label>
                              <input type="password" value={repoToken} onChange={(e) => setRepoToken(e.target.value)} placeholder="Paste App Password here" className="w-full p-2 text-sm border border-blue-200 dark:border-blue-700 rounded bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div>
                              <label className="block text-xs font-medium text-blue-700 dark:text-blue-400 mb-1">Target File Name / Path</label>
                              <input type="text" value={repoFilePath} onChange={(e) => setRepoFilePath(e.target.value)} placeholder="1View Map Data.txt" className="w-full p-2 text-sm border border-blue-200 dark:border-blue-700 rounded bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div>
                              <label className="block text-xs font-medium text-blue-700 dark:text-blue-400 mb-1">Branch</label>
                              <input type="text" value={repoBranch} onChange={(e) => setRepoBranch(e.target.value)} placeholder="main" className="w-full p-2 text-sm border border-blue-200 dark:border-blue-700 rounded bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                          </div>

                          <div className="flex flex-wrap items-center justify-between gap-4 mt-2 pt-3 border-t border-blue-200 dark:border-blue-800/50">
                            <div className="text-sm font-medium text-red-600 dark:text-red-400 min-h-[20px] flex-1 max-w-[60%]">
                              {syncStatus}
                            </div>
                            <div className="flex gap-2">
                              <button disabled={isSyncing} onClick={pullFromRepo} className="px-4 py-2 bg-white dark:bg-slate-700 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-600 hover:bg-blue-100 dark:hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 disabled:opacity-50">
                                <CloudDownload size={16} /> Pull (Load)
                              </button>
                              <button disabled={isSyncing} onClick={pushToRepo} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-2 disabled:opacity-50">
                                <CloudUpload size={16} /> Push (Save)
                              </button>
                            </div>
                          </div>
                        </div>

                        <div className="flex justify-between items-center mt-2">
                          <p className="text-sm text-gray-600 dark:text-gray-400">Or, edit the JSON structure manually below:</p>
                          <div className="flex gap-2">
                            <input type="file" accept=".txt,.json" ref={fileInputRef} style={{ display: 'none' }} onChange={handleFileUpload} />
                            <button onClick={() => fileInputRef.current.click()} className="text-xs text-blue-600 hover:underline">Upload Local File</button>
                            <span className="text-gray-300">|</span>
                            <button onClick={handleFileDownload} className="text-xs text-blue-600 hover:underline">Download Local File</button>
                          </div>
                        </div>
                        <textarea 
                          value={jsonInput} 
                          onChange={(e) => setJsonInput(e.target.value)} 
                          className="flex-1 min-h-[200px] w-full p-4 font-mono text-sm border border-gray-300 dark:border-slate-600 rounded-lg bg-gray-50 dark:bg-slate-700 text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-colors" 
                          spellCheck="false" 
                        />
                      </div>

                      <div className="px-6 py-4 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900 flex justify-between items-center transition-colors">
                        <button onClick={() => { if(confirm('Are you sure you want to reset to the default template? Your current layout will be lost.')){ setData(defaultData); setJsonInput(JSON.stringify(defaultData, null, 2)); } }} className="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50 rounded-lg text-sm font-medium transition-colors flex items-center gap-2" title="Reset to default template"><X size={16} /> Reset Default</button>
                        <div className="flex gap-3">
                          <button onClick={() => setShowDataEditor(false)} className="px-4 py-2 rounded-lg text-gray-700 dark:text-gray-300 font-medium hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">Cancel</button>
                          <button onClick={() => { try { setData(JSON.parse(jsonInput)); setShowDataEditor(false); } catch(e) { alert("Invalid JSON format"); } }} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium transition-colors">Apply Text Changes</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
